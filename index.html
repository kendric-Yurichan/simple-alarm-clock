<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alarm Clock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0a0e0a;
      --panel:     #0f150f;
      --border:    #2a3d2a;
      --amber:     #ffb300;
      --amber-dim: #7a5500;
      --green:     #1a8a1a;
      --green-dim: #0d3d0d;
      --red:       #e53935;
      --white:     #f0f0e8;
      --muted:     #4a5e4a;
      --glow:      0 0 8px #ffb30088, 0 0 20px #ffb30044;
      --glow-red:  0 0 8px #e5393588, 0 0 20px #e5393544;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 50% 0%, #1a2e1a 0%, transparent 65%),
        repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,.015) 40px, rgba(255,255,255,.015) 41px),
        repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,.015) 40px, rgba(255,255,255,.015) 41px);
      color: var(--white);
      font-family: 'Oswald', sans-serif;
      min-height: 100vh;
      padding: 32px 16px 64px;
    }

    .wrap { max-width: 640px; margin: 0 auto; }

    .scoreboard-header { text-align: center; margin-bottom: 24px; }
    .scoreboard-title  { font-size: 13px; letter-spacing: 6px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
    .scoreboard-name   { font-size: 28px; letter-spacing: 8px; color: var(--amber); text-shadow: var(--glow); text-transform: uppercase; }

    .panel {
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: 4px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04), 0 4px 24px rgba(0,0,0,.7), 0 0 0 1px rgba(255,179,0,.06);
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }
    .panel::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(180deg, transparent, transparent 3px, rgba(0,0,0,.08) 3px, rgba(0,0,0,.08) 4px);
      pointer-events: none;
    }

    .panel-bolts { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; }
    .bolt { position: absolute; width: 6px; height: 6px; border-radius: 50%; background: #2a3a2a; border: 1px solid var(--border); }
    .bolt.tl { top: 7px; left: 8px; } .bolt.tr { top: 7px; right: 8px; }
    .bolt.bl { bottom: 7px; left: 8px; } .bolt.br { bottom: 7px; right: 8px; }

    .clock-panel { padding: 28px 20px 20px; text-align: center; }
    .clock-label { font-size: 11px; letter-spacing: 5px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }

    #clock-display {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(56px, 16vw, 88px);
      letter-spacing: 4px;
      color: var(--amber);
      text-shadow: var(--glow);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    #clock-date { font-size: 13px; letter-spacing: 3px; color: var(--muted); margin-top: 10px; text-transform: uppercase; }

    .dot-row { display: flex; justify-content: center; gap: 6px; margin-top: 14px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green-dim); border: 1px solid var(--border); transition: background .1s, box-shadow .1s; }
    .dot.on { background: var(--green); box-shadow: 0 0 6px #1a8a1a88; }

    .form-panel { padding: 16px 20px; }
    .panel-section-label { font-size: 11px; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; }
    .form-row { display: flex; gap: 8px; flex-wrap: wrap; }

    input[type="time"], input[type="text"] {
      background: var(--bg); border: 1px solid var(--border); border-radius: 3px;
      padding: 10px 12px; font-size: 15px; color: var(--amber); outline: none;
      transition: border-color .15s, box-shadow .15s; letter-spacing: 2px;
    }
    input[type="time"] { font-family: 'Share Tech Mono', monospace; width: 138px; }
    input[type="text"] { font-family: 'Oswald', sans-serif; flex: 1; min-width: 120px; color: var(--white); letter-spacing: 1px; }
    input:focus { border-color: var(--amber); box-shadow: 0 0 0 2px rgba(255,179,0,.15); }
    input::placeholder { color: var(--muted); }

    .btn {
      border: none; border-radius: 3px; padding: 10px 20px;
      font-size: 13px; font-family: 'Oswald', sans-serif; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase; cursor: pointer;
      transition: opacity .15s, box-shadow .15s;
    }
    .btn:hover { opacity: .85; }
    .btn:active { opacity: .65; }
    .btn-add     { background: var(--green); color: #fff; box-shadow: 0 0 12px rgba(26,138,26,.4); }
    .btn-dismiss { background: var(--red); color: #fff; font-size: 15px; padding: 14px 40px; box-shadow: var(--glow-red); letter-spacing: 4px; }

    .settings-panel { padding: 16px 20px; }
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 480px) { .settings-grid { grid-template-columns: 1fr; } }

    .setting-block { display: flex; flex-direction: column; gap: 10px; }
    .setting-title { font-size: 11px; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; }

    .sound-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }

    .sound-btn {
      background: var(--bg); border: 1px solid var(--border); border-radius: 3px;
      padding: 7px 4px; font-size: 10px; font-family: 'Oswald', sans-serif;
      letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
      cursor: pointer; text-align: center; transition: all .15s; line-height: 1.3;
    }
    .sound-btn:hover { border-color: var(--amber-dim); color: var(--white); }
    .sound-btn.active { background: rgba(255,179,0,.12); border-color: var(--amber); color: var(--amber); box-shadow: 0 0 6px rgba(255,179,0,.2); }
    .sound-btn .icon { font-size: 16px; display: block; margin-bottom: 3px; }

    .btn-preview {
      background: var(--bg); border: 1px solid var(--border); border-radius: 3px;
      padding: 7px 12px; font-size: 10px; font-family: 'Oswald', sans-serif;
      letter-spacing: 3px; text-transform: uppercase; color: var(--muted);
      cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 6px;
    }
    .btn-preview:hover { border-color: var(--amber); color: var(--amber); }
    .btn-preview.playing { border-color: var(--green); color: var(--green); box-shadow: 0 0 6px rgba(26,138,26,.3); }

    .volume-row { display: flex; align-items: center; gap: 10px; }
    .volume-icon { font-size: 16px; flex-shrink: 0; }

    input[type="range"] {
      -webkit-appearance: none; width: 100%; height: 4px;
      background: var(--border); border-radius: 2px; outline: none; cursor: pointer; flex: 1;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
      background: var(--amber); box-shadow: var(--glow); cursor: pointer; border: none;
    }
    input[type="range"]::-moz-range-thumb {
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--amber); box-shadow: var(--glow); cursor: pointer; border: none;
    }
    .volume-pct { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--amber); min-width: 38px; text-align: right; letter-spacing: 1px; }

    .crescendo-row { display: flex; align-items: center; gap: 10px; }
    .crescendo-label { font-size: 12px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; flex: 1; line-height: 1.3; }

    .toggle { position: relative; display: inline-block; width: 40px; height: 22px; cursor: pointer; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track { position: absolute; inset: 0; background: var(--green-dim); border: 1px solid var(--border); border-radius: 2px; transition: background .2s, border-color .2s; }
    .toggle input:checked ~ .toggle-track { background: var(--green); border-color: var(--green); box-shadow: 0 0 8px rgba(26,138,26,.5); }
    .toggle-thumb { position: absolute; top: 3px; left: 3px; width: 14px; height: 14px; background: var(--muted); border-radius: 1px; transition: transform .2s, background .2s; }
    .toggle input:checked ~ .toggle-track .toggle-thumb { transform: translateX(18px); background: #fff; }

    .alarms-label { font-size: 11px; letter-spacing: 5px; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; padding: 0 2px; }
    #alarm-list { display: flex; flex-direction: column; gap: 6px; }

    .alarm-item {
      background: var(--panel); border: 1px solid var(--border); border-radius: 3px;
      padding: 12px 16px; display: flex; align-items: center; gap: 14px;
      position: relative; overflow: hidden; transition: opacity .2s;
    }
    .alarm-item::after {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--amber); box-shadow: var(--glow); transition: opacity .2s;
    }
    .alarm-item.off::after { opacity: 0; }
    .alarm-item.off { opacity: .35; }

    .alarm-time { font-family: 'Share Tech Mono', monospace; font-size: 26px; color: var(--amber); text-shadow: var(--glow); font-variant-numeric: tabular-nums; min-width: 78px; letter-spacing: 2px; }
    .alarm-item.off .alarm-time { color: var(--amber-dim); text-shadow: none; }
    .alarm-label { flex: 1; font-size: 14px; letter-spacing: 2px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-transform: uppercase; }

    .icon-btn {
      background: none; border: 1px solid transparent; cursor: pointer;
      font-size: 14px; padding: 5px 8px; border-radius: 3px; line-height: 1;
      color: var(--muted); font-family: 'Oswald', sans-serif; letter-spacing: 1px;
      transition: color .15s, border-color .15s; flex-shrink: 0;
    }
    .icon-btn:hover { color: var(--red); border-color: var(--red); }

    .empty { text-align: center; color: var(--muted); font-size: 12px; letter-spacing: 4px; padding: 28px 0; text-transform: uppercase; }

    .alarm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.88); z-index: 200; align-items: center; justify-content: center; }
    .alarm-overlay.ringing { display: flex; animation: fadeIn .3s ease; }

    .alarm-modal {
      background: var(--panel); border: 2px solid var(--amber); border-radius: 4px;
      padding: 48px 48px 40px; text-align: center; max-width: 340px; width: 90%;
      box-shadow: var(--glow), 0 32px 80px rgba(0,0,0,.9);
      animation: popIn .35s cubic-bezier(.34,1.56,.64,1); position: relative; overflow: hidden;
    }
    .alarm-modal::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(180deg, transparent, transparent 3px, rgba(0,0,0,.1) 3px, rgba(0,0,0,.1) 4px);
      pointer-events: none;
    }
    .alarm-bell { font-size: 52px; line-height: 1; margin-bottom: 16px; animation: bellShake .4s ease infinite alternate; }
    #overlay-label { font-size: 22px; letter-spacing: 5px; color: var(--amber); text-shadow: var(--glow); text-transform: uppercase; margin-bottom: 6px; }
    #overlay-time  { font-family: 'Share Tech Mono', monospace; font-size: 52px; color: var(--amber); text-shadow: var(--glow); font-variant-numeric: tabular-nums; letter-spacing: 4px; margin-bottom: 28px; }
    .overlay-vol   { font-size: 11px; letter-spacing: 3px; color: var(--muted); margin-top: 16px; text-transform: uppercase; }

    #toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #1a2a1a; border: 1px solid var(--border); color: var(--amber);
      padding: 9px 20px; border-radius: 3px; font-size: 12px; letter-spacing: 3px;
      text-transform: uppercase; opacity: 0; pointer-events: none;
      transition: opacity .2s, transform .2s; white-space: nowrap; z-index: 300;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @keyframes fadeIn    { from { opacity: 0; } to { opacity: 1; } }
    @keyframes popIn     { from { transform: scale(.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes bellShake { from { transform: rotate(-14deg); } to { transform: rotate(14deg); } }
  </style>
</head>
<body>
<div class="wrap">
  <div class="scoreboard-header">
    <div class="scoreboard-title">Stadium Alarm</div>
    <div class="scoreboard-name">⚾ Scoreboard</div>
  </div>

  <div class="panel clock-panel">
    <div class="panel-bolts"><div class="bolt tl"></div><div class="bolt tr"></div><div class="bolt bl"></div><div class="bolt br"></div></div>
    <div class="clock-label">Current Time</div>
    <div id="clock-display">00:00:00</div>
    <div id="clock-date"></div>
    <div class="dot-row">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>

  <div class="panel settings-panel">
    <div class="panel-bolts"><div class="bolt tl"></div><div class="bolt tr"></div><div class="bolt bl"></div><div class="bolt br"></div></div>
    <div class="panel-section-label">Sound Settings</div>
    <div class="settings-grid">
      <div class="setting-block">
        <div class="setting-title">Alarm Sound</div>
        <div class="sound-grid" id="sound-grid">
          <button class="sound-btn active" data-sound="radar"><span class="icon">📡</span>Radar</button>
          <button class="sound-btn" data-sound="chime"><span class="icon">🎵</span>Chime</button>
          <button class="sound-btn" data-sound="pulse"><span class="icon">⚡</span>Pulse</button>
          <button class="sound-btn" data-sound="beacon"><span class="icon">🔊</span>Beacon</button>
          <button class="sound-btn" data-sound="classic"><span class="icon">⏰</span>Classic</button>
          <button class="btn-preview" id="btn-preview">
            <span id="preview-icon">▶</span><span id="preview-text">Test</span>
          </button>
        </div>
      </div>
      <div class="setting-block">
        <div class="setting-title">Volume</div>
        <div class="volume-row">
          <span class="volume-icon">🔈</span>
          <input type="range" id="volume-slider" min="0" max="100" value="70" />
          <span class="volume-pct" id="volume-pct">70%</span>
        </div>
        <div style="height:12px"></div>
        <div class="setting-title">Gradual Wake</div>
        <div class="crescendo-row">
          <div class="crescendo-label">Start quiet,<br>rise over 30s</div>
          <label class="toggle">
            <input type="checkbox" id="crescendo-toggle" checked />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
        </div>
      </div>
    </div>
  </div>

  <div class="panel form-panel">
    <div class="panel-bolts"><div class="bolt tl"></div><div class="bolt tr"></div><div class="bolt bl"></div><div class="bolt br"></div></div>
    <div class="panel-section-label">Set Alarm</div>
    <div class="form-row">
      <input type="time" id="inp-time" />
      <input type="text" id="inp-label" placeholder="Label" maxlength="40" />
      <button class="btn btn-add" id="btn-add">Add</button>
    </div>
  </div>

  <div class="alarms-label">Scheduled Alarms</div>
  <div id="alarm-list"></div>
</div>

<div class="alarm-overlay" id="alarm-overlay">
  <div class="alarm-modal">
    <div class="alarm-bell">🔔</div>
    <div id="overlay-label">Alarm</div>
    <div id="overlay-time">00:00</div>
    <button class="btn btn-dismiss" id="btn-dismiss">Dismiss</button>
    <div class="overlay-vol" id="overlay-vol"></div>
  </div>
</div>

<div id="toast"></div>

<script>
  const ALARM_KEY    = 'alarms_v2';
  const SETTINGS_KEY = 'alarm_settings_v1';

  let alarms = [];
  let settings = { volume: 0.70, soundType: 'radar', crescendo: true };
  let currentlyRinging = null;
  let alarmStartTime   = null;
  let lastMinute       = null;
  let audioCtx         = null;
  let masterGain       = null;
  let beepTimer        = null;
  let previewTimer     = null;

  function saveAlarms()   { try { localStorage.setItem(ALARM_KEY,    JSON.stringify(alarms));   } catch {} }
  function saveSettings() { try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); } catch {} }

  function loadAll() {
    try { const r = localStorage.getItem(ALARM_KEY);    alarms   = r ? JSON.parse(r) : []; } catch { alarms = []; }
    try { const r = localStorage.getItem(SETTINGS_KEY); if (r) Object.assign(settings, JSON.parse(r)); } catch {}
  }

  function uid()  { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
  }

  function getAudio() {
    if (!audioCtx) {
      audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return { ctx: audioCtx, gain: masterGain };
  }

  function setMasterVolume(vol) {
    if (masterGain) masterGain.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.05);
  }

  // ── Sound synthesis ──────────────────────────────────────────

  function synthRadar(ctx, out, at) {
    for (let i = 0; i < 2; i++) {
      const t = at + i * 0.72;
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.connect(g); g.connect(out);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(480, t);
      osc.frequency.exponentialRampToValueAtTime(1340, t + 0.44);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(1.0, t + 0.04);
      g.gain.setValueAtTime(1.0, t + 0.38);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.54);
      osc.start(t); osc.stop(t + 0.56);
    }
  }

  function synthChime(ctx, out, at) {
    [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
      const t = at + i * 0.36;
      const o1 = ctx.createOscillator(), g1 = ctx.createGain();
      o1.connect(g1); g1.connect(out);
      o1.type = 'sine'; o1.frequency.setValueAtTime(freq, t);
      g1.gain.setValueAtTime(0, t);
      g1.gain.linearRampToValueAtTime(0.85, t + 0.012);
      g1.gain.exponentialRampToValueAtTime(0.001, t + 1.6);
      o1.start(t); o1.stop(t + 1.6);
      const o2 = ctx.createOscillator(), g2 = ctx.createGain();
      o2.connect(g2); g2.connect(out);
      o2.type = 'sine'; o2.frequency.setValueAtTime(freq * 2.756, t);
      g2.gain.setValueAtTime(0, t);
      g2.gain.linearRampToValueAtTime(0.28, t + 0.008);
      g2.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
      o2.start(t); o2.stop(t + 0.55);
    });
  }

  function synthPulse(ctx, out, at) {
    for (let i = 0; i < 8; i++) {
      const t = at + i * 0.13;
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.connect(g); g.connect(out);
      osc.type = 'square'; osc.frequency.setValueAtTime(i % 2 === 0 ? 880 : 1100, t);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.55, t + 0.008);
      g.gain.setValueAtTime(0.55, t + 0.075);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.115);
      osc.start(t); osc.stop(t + 0.12);
    }
  }

  function synthBeacon(ctx, out, at) {
    [[1.0, 0], [0.38, 0.14]].forEach(([vol, delay]) => {
      const t = at + delay;
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.connect(g); g.connect(out);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(920, t);
      osc.frequency.exponentialRampToValueAtTime(180, t + 1.0);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(vol, t + 0.04);
      g.gain.setValueAtTime(vol, t + 0.35);
      g.gain.exponentialRampToValueAtTime(0.001, t + 1.1);
      osc.start(t); osc.stop(t + 1.15);
    });
  }

  function synthClassic(ctx, out, at) {
    for (let i = 0; i < 2; i++) {
      const t = at + i * 0.52;
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.connect(g); g.connect(out);
      osc.type = 'square'; osc.frequency.setValueAtTime(900, t);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.65, t + 0.01);
      g.gain.setValueAtTime(0.65, t + 0.39);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.46);
      osc.start(t); osc.stop(t + 0.47);
    }
  }

  const SYNTHS    = { radar: synthRadar, chime: synthChime, pulse: synthPulse, beacon: synthBeacon, classic: synthClassic };
  const INTERVALS = { radar: 2200, chime: 2900, pulse: 1500, beacon: 2700, classic: 1900 };

  function getCrescendoVolume() {
    if (!settings.crescendo || !alarmStartTime) return settings.volume;
    const elapsed = (Date.now() - alarmStartTime) / 1000;
    return settings.volume * (0.12 + 0.88 * Math.min(elapsed / 30, 1));
  }

  function playPhrase(vol) {
    try {
      const { ctx, gain } = getAudio();
      setMasterVolume(vol ?? getCrescendoVolume());
      (SYNTHS[settings.soundType] || synthRadar)(ctx, gain, ctx.currentTime);
    } catch {}
  }

  function startBeep() {
    alarmStartTime = Date.now();
    playPhrase();
    beepTimer = setInterval(() => playPhrase(), INTERVALS[settings.soundType] || 2000);
  }

  function stopBeep() { clearInterval(beepTimer); beepTimer = null; alarmStartTime = null; }

  // ── CRUD ──────────────────────────────────────────────────────
  function render() {
    const el = document.getElementById('alarm-list');
    if (!alarms.length) { el.innerHTML = '<p class="empty">— No alarms scheduled —</p>'; return; }
    el.innerHTML = alarms.map(a => `
      <div class="alarm-item ${a.enabled ? '' : 'off'}">
        <div class="alarm-time">${esc(a.time)}</div>
        <div class="alarm-label">${a.label ? esc(a.label) : '—'}</div>
        <label class="toggle" title="${a.enabled ? 'Off' : 'On'}">
          <input type="checkbox" ${a.enabled ? 'checked' : ''} onchange="toggleAlarm('${esc(a.id)}')" />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
        <button class="icon-btn" onclick="deleteAlarm('${esc(a.id)}')">DEL</button>
      </div>
    `).join('');
  }

  function addAlarm() {
    const time  = document.getElementById('inp-time').value;
    const label = document.getElementById('inp-label').value.trim();
    if (!time) { showToast('Pick a time first'); return; }
    if (alarms.some(a => a.time === time && a.enabled)) { showToast(`Alarm at ${time} exists`); return; }
    alarms.push({ id: uid(), time, label, enabled: true });
    alarms.sort((a, b) => a.time.localeCompare(b.time));
    saveAlarms(); render();
    document.getElementById('inp-time').value  = '';
    document.getElementById('inp-label').value = '';
    requestNotifPermission();
  }

  function toggleAlarm(id) { const a = alarms.find(x => x.id === id); if (a) { a.enabled = !a.enabled; saveAlarms(); render(); } }
  function deleteAlarm(id) { alarms = alarms.filter(x => x.id !== id); saveAlarms(); render(); }

  // ── Clock ──────────────────────────────────────────────────────
  function updateDots(sec) {
    document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('on', i === sec % 9));
  }

  function tick() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2,'0');
    const mm = String(now.getMinutes()).padStart(2,'0');
    const ss = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('clock-display').textContent = `${hh}:${mm}:${ss}`;
    document.getElementById('clock-date').textContent =
      now.toLocaleDateString(undefined, { weekday:'long', year:'numeric', month:'long', day:'numeric' }).toUpperCase();
    updateDots(now.getSeconds());
    const minute = `${hh}:${mm}`;
    if (minute !== lastMinute) { lastMinute = minute; if (!currentlyRinging) checkAlarms(minute); }
  }

  function checkAlarms(minute) {
    const match = alarms.find(a => a.enabled && a.time === minute);
    if (!match) return;
    currentlyRinging = match.id;
    document.getElementById('overlay-label').textContent = match.label || 'Alarm';
    document.getElementById('overlay-time').textContent  = match.time;
    document.getElementById('alarm-overlay').classList.add('ringing');
    startBeep(); sendNotif(match); updateOverlayVol();
  }

  function updateOverlayVol() {
    if (!currentlyRinging) return;
    const pct = Math.round(getCrescendoVolume() * 100);
    document.getElementById('overlay-vol').textContent =
      settings.crescendo ? `Volume: ${pct}% — Rising` : `Volume: ${pct}%`;
  }

  function dismissAlarm() {
    document.getElementById('alarm-overlay').classList.remove('ringing');
    stopBeep(); currentlyRinging = null;
  }

  // ── Settings UI ────────────────────────────────────────────────
  function applySettings() {
    document.querySelectorAll('.sound-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.sound === settings.soundType));
    const pct = Math.round(settings.volume * 100);
    document.getElementById('volume-slider').value = pct;
    document.getElementById('volume-pct').textContent = `${pct}%`;
    document.getElementById('crescendo-toggle').checked = settings.crescendo;
  }

  // ── Notifications ──────────────────────────────────────────────
  async function requestNotifPermission() {
    if (!('Notification' in window) || Notification.permission !== 'default') return;
    await Notification.requestPermission();
  }
  function sendNotif(alarm) {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    new Notification('⏰ ' + (alarm.label || 'Alarm'), { body: `Your alarm for ${alarm.time} is ringing!`, silent: true });
  }

  // ── Init ──────────────────────────────────────────────────────
  loadAll(); render(); applySettings(); tick();
  setInterval(tick, 1000);
  setInterval(() => { if (currentlyRinging) updateOverlayVol(); }, 1000);

  document.addEventListener('click', () => { try { getAudio(); } catch {} }, { once: true });

  document.getElementById('btn-add').addEventListener('click', addAlarm);
  ['inp-label','inp-time'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('btn-add').click(); });
  });
  document.getElementById('btn-dismiss').addEventListener('click', dismissAlarm);

  document.getElementById('sound-grid').addEventListener('click', e => {
    const btn = e.target.closest('.sound-btn');
    if (!btn) return;
    settings.soundType = btn.dataset.sound;
    saveSettings(); applySettings();
  });

  document.getElementById('volume-slider').addEventListener('input', e => {
    settings.volume = parseInt(e.target.value) / 100;
    document.getElementById('volume-pct').textContent = `${e.target.value}%`;
    if (masterGain) setMasterVolume(settings.volume);
    saveSettings();
  });

  document.getElementById('crescendo-toggle').addEventListener('change', e => {
    settings.crescendo = e.target.checked;
    saveSettings();
  });

  document.getElementById('btn-preview').addEventListener('click', () => {
    clearTimeout(previewTimer);
    const btn = document.getElementById('btn-preview');
    document.getElementById('preview-icon').textContent = '♪';
    document.getElementById('preview-text').textContent = 'Playing';
    btn.classList.add('playing');
    playPhrase(settings.volume);
    previewTimer = setTimeout(() => {
      btn.classList.remove('playing');
      document.getElementById('preview-icon').textContent = '▶';
      document.getElementById('preview-text').textContent = 'Test';
    }, INTERVALS[settings.soundType] || 2000);
  });
</script>
</body>
</html>
