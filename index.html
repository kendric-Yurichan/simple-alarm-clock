<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Alarm Clock</title>
  <style>
    :root {
      --bg:      #f7f7f5;
      --surface: #ffffff;
      --border:  #e5e5e2;
      --text:    #1a1a1a;
      --muted:   #888;
      --accent:  #3a6df0;
      --danger:  #e54b4b;
      --radius:  12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      padding: 32px 16px 64px;
    }

    .wrap {
      max-width: 560px;
      margin: 0 auto;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 24px;
      color: var(--text);
    }

    /* ── Clock ── */
    .clock-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 20px;
      text-align: center;
      margin-bottom: 20px;
    }

    #clock-display {
      font-size: clamp(52px, 14vw, 80px);
      font-weight: 700;
      letter-spacing: -2px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    #clock-date {
      font-size: 14px;
      color: var(--muted);
      margin-top: 10px;
    }

    /* ── Add form ── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 20px;
    }

    .form-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    input[type="time"],
    input[type="text"] {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color .15s;
    }

    input[type="time"] { width: 130px; }
    input[type="text"] { flex: 1; min-width: 120px; }

    input:focus { border-color: var(--accent); }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:active { opacity: .75; }
    .btn-primary { background: var(--accent); color: #fff; }

    /* ── Alarm list ── */
    #alarm-list { display: flex; flex-direction: column; gap: 8px; }

    .alarm-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: opacity .2s;
    }

    .alarm-item.off { opacity: .45; }

    .alarm-time {
      font-size: 22px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      min-width: 72px;
    }

    .alarm-label {
      flex: 1;
      font-size: 14px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Toggle switch */
    .toggle { position: relative; display: inline-block; width: 40px; height: 22px; cursor: pointer; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 22px;
      transition: background .2s;
    }
    .toggle input:checked ~ .toggle-track { background: var(--accent); }
    .toggle-thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 16px; height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
    }
    .toggle input:checked ~ .toggle-track .toggle-thumb { transform: translateX(18px); }

    /* Delete button */
    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      border-radius: 6px;
      line-height: 1;
      opacity: .5;
      transition: opacity .15s, background .15s;
      flex-shrink: 0;
    }
    .icon-btn:hover { opacity: 1; background: #fee2e2; }

    /* Empty state */
    .empty {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      padding: 32px 0;
    }

    /* ── Alarm overlay ── */
    .alarm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .alarm-overlay.ringing { display: flex; animation: fadeIn .25s ease; }

    .alarm-modal {
      background: var(--surface);
      border-radius: 18px;
      padding: 40px 36px;
      text-align: center;
      box-shadow: 0 24px 80px rgba(0,0,0,.25);
      animation: popIn .3s cubic-bezier(.34,1.56,.64,1);
    }

    .alarm-bell { font-size: 56px; line-height: 1; margin-bottom: 12px; }
    #overlay-label { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
    #overlay-time { font-size: 16px; color: var(--muted); margin-bottom: 24px; font-variant-numeric: tabular-nums; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: #333;
      color: #fff;
      padding: 9px 18px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s, transform .2s;
      white-space: nowrap;
      z-index: 300;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes popIn   { from { transform: scale(.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>⏰ Alarm Clock</h1>

    <!-- Clock -->
    <div class="clock-card">
      <div id="clock-display">00:00:00</div>
      <div id="clock-date"></div>
    </div>

    <!-- Add alarm form -->
    <div class="form-card">
      <div class="form-row">
        <input type="time" id="inp-time" />
        <input type="text" id="inp-label" placeholder="Label (optional)" maxlength="40" />
        <button class="btn btn-primary" id="btn-add">Add</button>
      </div>
    </div>

    <!-- Alarm list -->
    <div id="alarm-list"></div>
  </div>

  <!-- Ringing overlay -->
  <div class="alarm-overlay" id="alarm-overlay">
    <div class="alarm-modal">
      <div class="alarm-bell">🔔</div>
      <div id="overlay-label">Alarm</div>
      <div id="overlay-time">00:00</div>
      <button class="btn btn-primary" id="btn-dismiss">Dismiss</button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script>
    const STORE_KEY = 'alarms_v1';
    let alarms = [];
    let currentlyRinging = null;
    let lastMinute = null;
    let audioCtx = null;
    let beepTimer = null;

    function save() {
      try { localStorage.setItem(STORE_KEY, JSON.stringify(alarms)); } catch {}
    }

    function load() {
      try {
        const raw = localStorage.getItem(STORE_KEY);
        alarms = raw ? JSON.parse(raw) : [];
      } catch { alarms = []; }
    }

    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    let toastTimer;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
    }

    function render() {
      const el = document.getElementById('alarm-list');
      if (!alarms.length) {
        el.innerHTML = '<p class="empty">No alarms set yet.</p>';
        return;
      }
      el.innerHTML = alarms.map(a => `
        <div class="alarm-item ${a.enabled ? '' : 'off'}" data-id="${esc(a.id)}">
          <div class="alarm-time">${esc(a.time)}</div>
          <div class="alarm-label">${a.label ? esc(a.label) : '<em style="opacity:.5">No label</em>'}</div>
          <label class="toggle" title="${a.enabled ? 'Disable' : 'Enable'}">
            <input type="checkbox" ${a.enabled ? 'checked' : ''} onchange="toggleAlarm('${esc(a.id)}')" />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
          <button class="icon-btn" onclick="deleteAlarm('${esc(a.id)}')" title="Delete">🗑</button>
        </div>
      `).join('');
    }

    function addAlarm() {
      const time  = document.getElementById('inp-time').value;
      const label = document.getElementById('inp-label').value.trim();
      if (!time) { showToast('Please pick a time first.'); return; }
      if (alarms.some(a => a.time === time && a.enabled)) {
        showToast(`An alarm at ${time} already exists.`); return;
      }
      alarms.push({ id: uid(), time, label, enabled: true });
      alarms.sort((a, b) => a.time.localeCompare(b.time));
      save(); render();
      document.getElementById('inp-time').value = '';
      document.getElementById('inp-label').value = '';
      requestNotifPermission();
    }

    function toggleAlarm(id) {
      const a = alarms.find(x => x.id === id);
      if (a) { a.enabled = !a.enabled; save(); render(); }
    }

    function deleteAlarm(id) {
      alarms = alarms.filter(x => x.id !== id);
      save(); render();
    }

    function tick() {
      const now = new Date();
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      const ss = String(now.getSeconds()).padStart(2, '0');

      document.getElementById('clock-display').textContent = `${hh}:${mm}:${ss}`;
      document.getElementById('clock-date').textContent = now.toLocaleDateString(
        undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }
      );

      const minute = `${hh}:${mm}`;
      if (minute !== lastMinute) {
        lastMinute = minute;
        if (!currentlyRinging) checkAlarms(minute);
      }
    }

    function checkAlarms(minute) {
      const match = alarms.find(a => a.enabled && a.time === minute);
      if (!match) return;
      currentlyRinging = match.id;
      document.getElementById('overlay-label').textContent = match.label || 'Alarm';
      document.getElementById('overlay-time').textContent  = match.time;
      document.getElementById('alarm-overlay').classList.add('ringing');
      startBeep();
      sendNotif(match);
    }

    function dismissAlarm() {
      document.getElementById('alarm-overlay').classList.remove('ringing');
      stopBeep();
      currentlyRinging = null;
    }

    function getCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playBeep() {
      try {
        const ctx  = getCtx();
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        gain.gain.setValueAtTime(0.4, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.5);

        const osc2  = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.connect(gain2);
        gain2.connect(ctx.destination);
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(1108, ctx.currentTime + 0.15);
        gain2.gain.setValueAtTime(0.3, ctx.currentTime + 0.15);
        gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.55);
        osc2.start(ctx.currentTime + 0.15);
        osc2.stop(ctx.currentTime + 0.55);
      } catch {}
    }

    function startBeep() {
      playBeep();
      beepTimer = setInterval(playBeep, 1200);
    }

    function stopBeep() {
      clearInterval(beepTimer);
      beepTimer = null;
    }

    async function requestNotifPermission() {
      if (!('Notification' in window) || Notification.permission !== 'default') return;
      await Notification.requestPermission();
    }

    function sendNotif(alarm) {
      if (!('Notification' in window) || Notification.permission !== 'granted') return;
      new Notification('⏰ ' + (alarm.label || 'Alarm'), {
        body: `Your alarm for ${alarm.time} is ringing!`,
        silent: true,
      });
    }

    load();
    render();
    tick();
    setInterval(tick, 1000);

    document.addEventListener('click', () => { try { getCtx(); } catch {} }, { once: true });

    document.getElementById('btn-add').addEventListener('click', addAlarm);
    document.getElementById('btn-dismiss').addEventListener('click', dismissAlarm);

    document.getElementById('inp-label').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-add').click();
    });
    document.getElementById('inp-time').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-add').click();
    });
  </script>
</body>
</html>
